	<title></title>
	<SCRIPT>
	// 4. Submission Logic
	function uploadFile() {
		    const file = document.getElementById("fileUpload").files[0];

		    // Example upload logic
		    const formData = new FormData();
		    formData.append("file", file);

		    
		    $.ajax({
		        url: "./uploadfilestatus",
		        type: "POST",
		        data: formData,
		        processData: false,
		        contentType: false,
		        success: function (response) {
		        	alert(response)
		        },
		        error: function (xhr) {
		        	alert(response)
		        }
		    });
		}
	
	
	</SCRIPT>
